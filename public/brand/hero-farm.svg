<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Funni Farm ink-style hemp wellness background</title>
  <desc id="desc">A cream parchment farm illustration inspired by the Funni Farm logo, with ink vines, moon, windmill, soft fields, and hemp leaves around the edges.</desc>
  <defs>
    <radialGradient id="moonGlow" cx="22%" cy="24%" r="20%">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset=".55" stop-color="#f3dfb9"/>
      <stop offset="1" stop-color="#f3dfb9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset=".58" stop-color="#f7ecd3"/>
      <stop offset="1" stop-color="#ead8b3"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency=".62" numOctaves="3" seed="17" type="fractalNoise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA slope=".075" type="linear"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <g id="leaf" fill="none" stroke="#26351f" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 0c9 20 9 43 0 68"/>
      <path d="M0 18c-23-18-38-21-54-17 8 15 23 25 54 31"/>
      <path d="M0 23c23-18 38-21 54-17-8 15-23 25-54 31"/>
      <path d="M0 37c-20-11-33-12-48-7 9 12 22 18 48 20"/>
      <path d="M0 39c20-11 33-12 48-7-9 12-22 18-48 20"/>
      <path d="M0 54c-14-5-25-4-36 2 8 8 17 12 36 12"/>
      <path d="M0 54c14-5 25-4 36 2-8 8-17 12-36 12"/>
    </g>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>
  <rect width="1600" height="900" fill="url(#moonGlow)"/>

  <g opacity=".92">
    <circle cx="252" cy="212" r="88" fill="#fff8e8" stroke="#171611" stroke-width="4" opacity=".72"/>
